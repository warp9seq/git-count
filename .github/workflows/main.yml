name: Count Git clones
on:
  workflow_dispatch:
  schedule:
    - cron: "17 0 * * *"

jobs:
  count-downloads:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
      - name: get counts
        run: ./getcounts.sh
      - name: try
        run: |
          curl -H "Authorization: Bearer ${{ secrets.TRAFFIC }}" \
          https://api.github.com/repos/warp9seq/minimod/traffic/clones